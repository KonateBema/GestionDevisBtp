{% extends 'base.html' %}

{% block title %}Créer Devis{% endblock %}

{% block content %}

<style>
    .page-header {
        background: linear-gradient(135deg, #0d6efd, #4f8cff);
        color: white;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
    }

    .card-box {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .line-box {
        background: #f8f9fc;
        padding: 15px;
        border-radius: 12px;
    }

    .btn-modern {
        border-radius: 10px;
        padding: 8px 14px;
    }
</style>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h3 class="mb-0">📄 Création de devis</h3>
            <small>Créer un devis pour un projet BTP</small>
        </div>

        <a href="{% url 'dashboard' %}" class="btn btn-light btn-modern">
            ⬅ Retour
        </a>
    </div>

    <!-- FORM CARD -->
    <div class="card-box">

        <form method="POST">
            {% csrf_token %}

            <!-- PROJET -->
            <div class="mb-3">
                <label class="form-label">🏗️ Projet</label>
                <select name="projet" class="form-select" required>
                    {% for p in projets %}
                        <option value="{{ p.id }}">{{ p.nom }}</option>
                    {% endfor %}
                </select>
            </div>

            <hr>

            <h5 class="mb-3">📦 Lignes du devis</h5>

            <!-- LIGNES -->
            <div id="lines">

                <div class="row g-2 mb-2 line-box">

                    <div class="col-md-5">
                        <label class="form-label">Matériau</label>
                        <select name="materiau_0" class="form-select">
                            {% for m in materiaux %}
                                <option value="{{ m.id }}">{{ m.designation }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Quantité</label>
                        <input type="number" name="quantite_0" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Prix</label>
                        <input type="number" name="prix_0" class="form-control">
                    </div>

                </div>

            </div>

            <!-- ADD BUTTON -->
            <button type="button"
                    class="btn btn-outline-secondary btn-modern mb-3"
                    onclick="addLine()">
                ➕ Ajouter une ligne
            </button>

            <br>

            <button class="btn btn-primary btn-modern">
                💾 Enregistrer le devis
            </button>

        </form>

    </div>

</div>

<script>
let i = 1;

function addLine() {
    const container = document.getElementById("lines");

    container.innerHTML += `
        <div class="row g-2 mb-2 line-box">

            <div class="col-md-5">
                <select name="materiau_${i}" class="form-select">
                    {% for m in materiaux %}
                        <option value="{{ m.id }}">{{ m.designation }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <input type="number" name="quantite_${i}" class="form-control">
            </div>

            <div class="col-md-3">
                <input type="number" name="prix_${i}" class="form-control">
            </div>

        </div>
    `;

    i++;
}
</script>

{% endblock %}
