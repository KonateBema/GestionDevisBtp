<!DOCTYPE html>
{% load static %}
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Connexion - Gestion Devis BTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;

            /* IMAGE DE FOND */
            background: url("{% static 'images/bg-login.jpg' %}") no-repeat center center fixed;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        /* OVERLAY sombre */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            border-radius: 18px;

            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);

            padding: 30px;

            position: relative;
            z-index: 1;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            font-weight: bold;
            font-size: 20px;
            color: #0d6efd;
        }

        .brand img {
            border-radius: 8px;
        }

        .title {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
            color: #333;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .btn-primary {
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #0a58ca;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<div class="login-card">

    <!-- BRAND -->
    <div class="text-center mb-3">

        <div class="brand">
            <img src="{% static 'images/logo-btp.png' %}" width="40" alt="Logo">
            Gestion Devis BTP
        </div>

        <div class="title">Connexion</div>
        <div class="subtitle">Accédez à votre espace sécurisé</div>
    </div>

    <!-- ERROR -->
    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    <!-- FORM -->
    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" placeholder="Entrer votre username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" name="password" class="form-control" placeholder="Entrer votre mot de passe" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            🔐 Se connecter
        </button>
    </form>

</div>

</body>
</html>
