<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Gestion Devis BTP</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            height: 100vh;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
        }

        .brand {
            font-weight: bold;
            font-size: 22px;
            color: #0d6efd;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card shadow-lg login-card p-4">

    <div class="text-center mb-3">
        <div class="brand">🏗️ Gestion Devis BTP</div>
        <h4 class="mt-2">Connexion</h4>
    </div>

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" placeholder="Entrer votre username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" name="password" class="form-control" placeholder="Entrer votre mot de passe" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Se connecter
        </button>
    </form>

    <div class="text-center mt-3 text-muted" style="font-size: 12px;">
        Système sécurisé BTP
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
