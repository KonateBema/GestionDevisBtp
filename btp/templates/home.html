{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.card-box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    text-align: center;
}

.big-number {
    font-size: 28px;
    font-weight: bold;
}
</style>

<div class="container mt-4">

<h3>📊 Dashboard BTP</h3>

<!-- STATS -->
<div class="row mt-3">

    <div class="col-md-3">
        <div class="card-box">
            👤 Clients
            <div class="big-number">{{ clients_count }}</div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card-box">
            🏗️ Projets
            <div class="big-number">{{ projets_count }}</div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card-box">
            📄 Devis
            <div class="big-number">{{ devis_count }}</div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card-box">
            💰 CA
            <div class="big-number">{{ total_ca }} FCFA</div>
        </div>
    </div>

</div>

<!-- GRAPHIQUES -->
<div class="row mt-4">

    <!-- BAR CHART -->
    <div class="col-md-6">
        <div class="card-box">
            <h5>📊 Statut des devis</h5>
            <canvas id="devisChart"></canvas>
        </div>
    </div>

</div>

</div>

<script>
const ctx = document.getElementById('devisChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Brouillon', 'Envoyé', 'Accepté', 'Refusé'],
        datasets: [{
            label: 'Devis',
            data: [
                {{ devis_brouillon }},
                {{ devis_envoye }},
                {{ devis_accepte }},
                {{ devis_refuse }}
            ],
            backgroundColor: [
                '#ffc107',
                '#0d6efd',
                '#198754',
                '#dc3545'
            ]
        }]
    },
    options: {
        responsive: true
    }
});
</script>

{% endblock %}
