{% extends 'base.html' %}

{% block title %}Créer matériau{% endblock %}

{% block content %}

<style>
.page-header {
    background: linear-gradient(135deg, #198754, #2ecc71);
    color: white;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.card-box {
    max-width: 650px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}

.btn-modern {
    border-radius: 10px;
}
</style>

<div class="container">

    <!-- HEADER -->
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">

        <div>
            <h3 class="mb-0">📦 Nouveau matériau</h3>
            <small>Ajouter un matériau au catalogue</small>
        </div>

        <a href="{% url 'dashboard' %}" class="btn btn-light btn-modern">
            ⬅ Retour
        </a>

    </div>

    <!-- FORM -->
    <div class="card-box">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Désignation</label>
                <input type="text" name="designation" class="form-control" placeholder="Ex: Ciment 50kg" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Unité</label>
                <input type="text" name="unite" class="form-control" placeholder="Sac / m² / m³">
            </div>

            <div class="mb-3">
                <label class="form-label">Prix unitaire</label>
                <input type="number" name="prix_unitaire" class="form-control" placeholder="Ex: 5000">
            </div>

            <button type="submit" class="btn btn-success w-100 btn-modern">
                💾 Enregistrer le matériau
            </button>

        </form>

    </div>

</div>

{% endblock %}
