{% extends 'base.html' %}

{% block title %}Modifier projet{% endblock %}

{% block content %}

<style>

.page-header {
    background: linear-gradient(135deg, #ffc107, #ff9800);
    color: white;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.card-form {
    background: white;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    padding: 25px;
}

.form-label {
    font-weight: 600;
    color: #495057;
}

.form-control,
.form-select {
    border-radius: 12px;
    padding: 10px;
    border: 1px solid #e0e0e0;
    transition: 0.3s;
}

.form-control:focus,
.form-select:focus {
    border-color: #ffc107;
    box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.2);
}

.btn-modern {
    border-radius: 10px;
    padding: 10px 15px;
    font-weight: 600;
}

.progress-text {
    font-size: 14px;
    color: #6c757d;
}

</style>

<div class="container">

    <!-- HEADER -->
    <div class="page-header d-flex justify-content-between align-items-center">

        <div>
            <h3 class="mb-0">✏️ Modifier le projet</h3>
            <small>{{ projet.nom }}</small>
        </div>

        <a href="{% url 'liste_projets' %}" class="btn btn-light">
            ⬅ Retour
        </a>

    </div>

    <!-- FORM -->
    <div class="card-form">

        <form method="POST">
            {% csrf_token %}

            <!-- NOM -->
            <div class="mb-3">
                <label class="form-label">🏢 Nom du projet</label>
                <input type="text"
                       name="nom"
                       class="form-control"
                       value="{{ projet.nom }}"
                       required>
            </div>

            <!-- LOCALISATION -->
            <div class="mb-3">
                <label class="form-label">📍 Localisation</label>
                <input type="text"
                       name="localisation"
                       class="form-control"
                       value="{{ projet.localisation }}">
            </div>

            <!-- CLIENT -->
            <div class="mb-3">
                <label class="form-label">👤 Client</label>

                <select name="client" class="form-select">

                    {% for client in clients %}
                        <option value="{{ client.id }}"
                            {% if client.id == projet.client.id %}selected{% endif %}>
                            {{ client.nom }}
                        </option>
                    {% endfor %}

                </select>
            </div>

            <!-- DATE -->
            <div class="mb-3">
                <label class="form-label">📅 Date de début</label>
                <input type="date"
                       name="date_debut"
                       class="form-control"
                       value="{{ projet.date_debut|date:'Y-m-d' }}">
            </div>

            <!-- BUDGET -->
            <div class="mb-3">
                <label class="form-label">💰 Budget du projet</label>
                <input type="number"
                       name="budget"
                       class="form-control"
                       step="0.01"
                       value="{{ projet.budget }}">
            </div>

            <!-- PROGRESSION -->
            <div class="mb-3">
                <label class="form-label">📊 Progression (%)</label>

                <input type="range"
                       name="progression"
                       min="0"
                       max="100"
                       class="form-range"
                       value="{{ projet.progression }}">

                <div class="progress-text mt-1">
                    Progression actuelle : <span id="progressValue">{{ projet.progression }}</span>%
                </div>
            </div>

            <!-- BUTTONS -->
            <div class="d-flex justify-content-between mt-4">

                <a href="{% url 'liste_projets' %}"
                   class="btn btn-outline-secondary btn-modern">
                    ⬅ Annuler
                </a>

                <button type="submit"
                        class="btn btn-warning btn-modern">
                    💾 Enregistrer les modifications
                </button>

            </div>

        </form>

    </div>

</div>

<!-- JS LIVE PROGRESSION -->
<script>
const range = document.querySelector('input[name="progression"]');
const display = document.getElementById('progressValue');

range.addEventListener('input', function () {
    display.innerText = this.value;
});
</script>

{% endblock %}
