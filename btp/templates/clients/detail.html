{% extends 'base.html' %}

{% block title %}Détail Client{% endblock %}

{% block content %}

<style>
.card-detail{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.info{
    margin-bottom:12px;
    padding:12px;
    background:#f8f9fa;
    border-radius:10px;
}

.label{
    font-size:13px;
    color:#6c757d;
}

.value{
    font-size:16px;
    font-weight:600;
}
</style>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>👤 Détail Client</h3>

        <a href="{% url 'liste_clients' %}" class="btn btn-secondary">
            ⬅ Retour
        </a>
    </div>

    <div class="card-detail">

        <div class="info">
            <div class="label">Nom</div>
            <div class="value">{{ client.nom }}</div>
        </div>

        <div class="info">
            <div class="label">Téléphone</div>
            <div class="value">{{ client.telephone }}</div>
        </div>

        <div class="info">
            <div class="label">Email</div>
            <div class="value">{{ client.email }}</div>
        </div>

        <div class="info">
            <div class="label">Adresse</div>
            <div class="value">{{ client.adresse }}</div>
        </div>

    </div>

</div>

{% endblock %}
