{% extends 'base.html' %}

{% block title %}Créer Client{% endblock %}

{% block content %}

<style>
.page-header {
    background: linear-gradient(135deg, #198754, #2ecc71);
    color: white;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.card-box {
    background: white;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}

.btn-modern {
    border-radius: 10px;
}
</style>

<div class="container">

    <!-- HEADER -->
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h3 class="mb-0">👤 Création de client</h3>
            <small>Ajouter un nouveau client</small>
        </div>

        <a href="{% url 'dashboard' %}" class="btn btn-light btn-modern">
            ⬅ Retour
        </a>
    </div>

    <!-- FORM -->
    <div class="card-box">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nom complet</label>
                <input type="text" name="nom" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Téléphone</label>
                <input type="text" name="telephone" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Adresse</label>
                <textarea name="adresse" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100">
                💾 Enregistrer
            </button>

        </form>

    </div>

</div>

{% endblock %}
