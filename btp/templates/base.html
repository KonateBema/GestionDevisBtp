{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}BTP{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* =========================
           BACKGROUND GLOBAL
        ========================== */
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            background: url("{% static 'images/bg-btp.jpg' %}") no-repeat center center fixed;
            background-size: cover;

            position: relative;
        }

        /* OVERLAY PLUS LÉGER (IMPORTANT) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;

            background: rgba(255, 255, 255, 0.45); /* 👈 ajuste ici */

            z-index: 0;
        }

        /* =========================
           SIDEBAR
        ========================== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;

            width: 240px;
            height: 100vh;

            background: #c505bc;
            color: white;

            padding: 20px;
            z-index: 2;
        }

        .sidebar .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;

            padding: 10px;
            border-radius: 8px;

            margin-bottom: 6px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(3px);
        }

        /* =========================
           CONTENT
        ========================== */
        .content {
            margin-left: 250px;
            padding: 25px;
            position: relative;
            z-index: 2;
        }

        /* =========================
           CARDS
        ========================== */
        .card-box {
            background: white;
            padding: 20px;
            border-radius: 15px;

            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        /* =========================
           TOAST
        ========================== */
        .toast-container {
            z-index: 9999;
        }
    </style>
</head>

<body>

<!-- =========================
     TOAST MESSAGES
========================== -->
{% if messages %}
<div class="toast-container position-fixed top-0 end-0 p-3">
    {% for message in messages %}
    <div class="toast show align-items-center text-white bg-success border-0 mb-2">
        <div class="d-flex">
            <div class="toast-body">
                {{ message }}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"></button>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}

<!-- =========================
     SIDEBAR
========================== -->
<div class="sidebar">
    <div class="brand">
        <img src="{% static 'images/logo-btp.png' %}" width="40">
        <span>BTP APP</span>
    </div>

    <hr>

    <a href="{% url 'dashboard' %}">📊 Dashboard</a>
    <a href="{% url 'create_devis' %}">📄 Devis</a>
    <a href="{% url 'devis_list' %}">📋 Liste devis</a>
    <a href="{% url 'liste_projets' %}">🏗️ Projets</a>
    <a href="{% url 'liste_clients' %}">👤 Clients</a>
    <a href="{% url 'materiaux_list' %}">📦 Matériaux</a>
    <a href="{% url 'users_list' %}">⚙️ Users</a>

    <hr>

    <a href="{% url 'logout' %}">🚪 Déconnexion</a>
</div>

<!-- =========================
     CONTENT
========================== -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

<!-- =========================
     TOAST SCRIPT
========================== -->
<script>
setTimeout(() => {
    document.querySelectorAll('.toast').forEach(toast => {
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 500);
    });
}, 3000);
</script>

</body>
</html>
