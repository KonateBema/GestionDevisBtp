<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}BTP{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f4f6fb;
        }

        /* SIDEBAR FIXE */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 240px;
            height: 100vh;
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }

        /* CONTENU À DROITE */
        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .card-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>

<!-- SIDEBAR FIXE -->
<div class="sidebar">
    <h4>🏗️ BTP APP</h4>
    <hr>

    <a href="{% url 'dashboard' %}">📊 Dashboard</a>
    <a href="{% url 'create_devis' %}">📄 Devis</a>
    <a href="{% url 'devis_list' %}">📋 Liste devis</a>
    <a href="{% url 'create_projet' %}">🏗️ Projets</a>
    <a href="{% url 'create_client' %}">👤 Clients</a>
    <a href="{% url 'materiaux_list' %}">📦 Matériaux</a>
    <a href="{% url 'users_list' %}">⚙️ Users</a>

    <hr>

    <a href="{% url 'logout' %}">🚪 Déconnexion</a>
</div>

<!-- CONTENU -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
